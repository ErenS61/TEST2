  <body>
    <div>
      <h1 id="pageTitle">⛽ Prix Carburants</h1>
      <div class="station-info" id="stationInfo"></div>
      <div id="stationSelectorContainer"></div>
      <div class="carburant-container" id="carburantContainer"></div>
    </div>
    <div class="footer">
      Données mises à jour automatiquement par le gouvernement français. <br />
      Les dates de mise à jour sont déclaratives et peuvent indiquer une mise à jour à venir.
    </div>

    <!-- Boutons flottants -->
    <div class="floating-buttons">
      <!-- Bouton principal en BAS -->
      <button class="main-button" id="mainFloatingButton">
        <i class="fa-solid fa-plus"></i>
      </button>

      <button class="refresh-button" onclick="refreshPage()">
        <i class="fa-solid fa-rotate-right"></i>
      </button>

      <button class="favorite-button" onclick="toggleFavorite()" id="favoriteButton">
        <i class="fa-solid fa-star"></i>
      </button>

      <button class="favorites-button" onclick="showFavorites()" id="favoritesButton">
        <i class="fa-solid fa-gas-pump"></i>
      </button>

      <button class="map-button" onclick="showMap()">
        <i class="fa-solid fa-map-location-dot"></i>
      </button>

      <button class="services-button" onclick="showServices()" id="servicesButton">
        <i class="fa-solid fa-check"></i>
      </button>

      <button class="hours-button" onclick="showHours()" id="hoursButton">
        <i class="fa-solid fa-clock"></i>
      </button>
    </div>

    <script>
      const script = document.createElement("script");
      script.src = "stations.js?v=" + new Date().getTime();
      script.onload = function () {
        // Charger d'abord le fichier des services
        const servicesScript = document.createElement("script");
        servicesScript.src = "services.js";
        servicesScript.onload = function () {
          const script2 = document.createElement("script");
          script2.src = "script.js";
          document.body.appendChild(script2);
        };
        document.body.appendChild(servicesScript);
      };
      document.body.appendChild(script);
    </script>
  </body>
